<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — NovaNext</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAFAF8;
    --ink: #1A1D21;
    --ink-soft: #5B6068;
    --accent: #f47629;
    --accent-soft: #fdebe0;
    --line: #E6E3DC;
    --card: #FFFFFF;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- NAV ---------- */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 48px;
    position: sticky;
    top: 0;
    background: rgba(250, 250, 248, 0.92);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--line);
    z-index: 10;
  }

  .logo {
    font-family: 'Archivo', sans-serif;
    font-weight: 800;
    font-size: 20px;
    background: linear-gradient(90deg, var(--ink), var(--accent));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .nav-links {
    display: flex;
    gap: 32px;
    list-style: none;
  }

  .nav-links a {
    color: var(--ink-soft);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: color 0.15s ease;
  }

  .nav-links a:hover,
  .nav-links a:focus-visible { color: var(--accent); }

  .nav-links a.active { color: var(--ink); font-weight: 600; }

  /* ---------- HERO ---------- */
  .hero {
    max-width: 640px;
    margin: 0 auto;
    padding: 72px 24px 32px;
    text-align: center;
  }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
    display: inline-block;
  }

  h1 {
    font-family: 'Archivo', sans-serif;
    font-weight: 800;
    font-size: 40px;
    letter-spacing: -0.01em;
    margin-bottom: 14px;
  }

  .hero p {
    color: var(--ink-soft);
    font-size: 16px;
    max-width: 460px;
    margin: 0 auto;
  }

  /* ---------- FORM CARD ---------- */
  main {
    max-width: 560px;
    margin: 0 auto;
    padding: 0 24px 96px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 40px;
    box-shadow: 0 1px 2px rgba(26, 29, 33, 0.04);
  }

  .field { margin-bottom: 22px; }

  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--ink);
  }

  input, textarea {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--line);
    border-radius: 10px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    color: var(--ink);
    background: var(--bg);
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }

  input::placeholder, textarea::placeholder { color: #9A9F a6; opacity: 0.6; }

  input:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  textarea { resize: vertical; min-height: 130px; }

  button {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.05s ease;
  }

  button:hover { background: #db6620; }
  button:active { transform: scale(0.99); }

  .status {
    margin-top: 16px;
    font-size: 14px;
    text-align: center;
    display: none;
  }

  .status.success { color: #1f8a4c; display: block; }
  .status.error { color: #c0392b; display: block; }

  /* honeypot — hidden from real visitors, traps simple bots */
  .hp { position: absolute; left: -9999px; }

  footer {
    border-top: 1px solid var(--line);
    padding: 28px 48px;
    text-align: center;
    color: var(--ink-soft);
    font-size: 13px;
  }

  @media (max-width: 600px) {
    nav { padding: 18px 20px; }
    .nav-links { gap: 18px; }
    .card { padding: 28px 22px; }
    h1 { font-size: 30px; }
  }
</style>
</head>
<body>

<nav>
  <div class="logo">NovaNext</div>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="product.html">Products</a></li>
    <li><a href="#">Support</a></li>
    <li><a href="#">Privacy</a></li>
    <li><a href="contact.html" class="active">Contact</a></li>
  </ul>
</nav>

<section class="hero">
  <span class="eyebrow">Get in touch</span>
  <h1>Let's talk</h1>
  <p>Questions, feedback, or a bug to report — send a message and we'll get back to you.</p>
</section>

<main>
  <div class="card">
    <form id="contact-form" data-endpoint="https://formspree.io/f/xpqqpgnl">
      <!-- Replace YOUR_FORM_ID above with your Formspree form ID from the dashboard -->
      <input type="text" name="_gotcha" class="hp" tabindex="-1" autocomplete="off">

      <div class="field">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Your name" required>
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>

      <div class="field">
        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="How can we help?" required></textarea>
      </div>

      <button type="submit" id="submit-btn">Send message</button>
      <p class="status" id="status"></p>
    </form>
  </div>
</main>

<footer>
  © 2026 NovaNext. All rights reserved.
</footer>

<script>
  const form = document.getElementById('contact-form');
  const status = document.getElementById('status');
  const btn = document.getElementById('submit-btn');

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    btn.disabled = true;
    btn.textContent = 'Sending…';
    status.className = 'status';
    status.textContent = '';

    const formData = new FormData(form);
    const endpoint = form.dataset.endpoint;

    try {
      const response = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Accept': 'application/json' },
        body: formData
      });

      if (response.ok) {
        status.textContent = "Message sent — we'll get back to you soon.";
        status.className = 'status success';
        form.reset();
      } else {
        const result = await response.json().catch(() => null);
        status.textContent = (result && result.errors && result.errors[0]?.message)
          ? result.errors[0].message
          : 'Something went wrong. Please try again.';
        status.className = 'status error';
      }
    } catch (err) {
      status.textContent = 'Network error. Please try again.';
      status.className = 'status error';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Send message';
    }
  });
</script>

</body>
</html>
