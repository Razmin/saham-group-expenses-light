<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - NovaNext</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
    --bg:#fafaf8;
    --surface:#ffffff;
    --text:#111827;
    --muted:#6b7280;
    --border:#e5e7eb;

    --blue:#2563eb;
    --purple:#7c3aed;
    --green:#10b981;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:var(--text);
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
}

.container{
    width:min(1120px,92%);
    margin:auto;
}

/* ---------------- NAV ---------------- */

nav{
    position:sticky;
    top:0;
    z-index:100;
    background:rgba(255,255,255,.85);
    backdrop-filter:blur(12px);
    box-shadow:0 1px 0 var(--border), 0 4px 16px rgba(17,24,39,.04);
}

.nav-inner{
    height:72px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:22px;
    font-weight:800;
    letter-spacing:-0.03em;
    text-decoration:none;
    background:linear-gradient(135deg,var(--blue),var(--purple));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
}

.nav-links{
    display:flex;
    align-items:center;
    gap:28px;
}

.nav-links a{
    text-decoration:none;
    color:var(--muted);
    font-weight:500;
}

.nav-links a:hover{
    color:var(--text);
}

.nav-links a.active{
    color:var(--text);
}

.nav-cta{
    background:linear-gradient(135deg,var(--blue),var(--purple));
    color:white !important;
    padding:10px 20px;
    border-radius:12px;
    font-weight:600;
    font-size:14px;
    transition:.2s;
}

.nav-cta:hover{
    transform:translateY(-1px);
    box-shadow:0 8px 20px rgba(37,99,235,.25);
}

/* ---------------- PAGE HERO ---------------- */

.page-hero{
    padding:80px 0 50px;
    text-align:center;

    background:
        radial-gradient(circle at top left, rgba(124,58,237,.10), transparent 30%),
        radial-gradient(circle at top right, rgba(37,99,235,.10), transparent 30%);
}

.eyebrow{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:white;
    border:1px solid var(--border);
    padding:7px 16px;
    border-radius:999px;
    font-size:13px;
    font-weight:600;
    color:var(--muted);
    margin-bottom:26px;
}

.eyebrow .dot{
    width:7px;
    height:7px;
    border-radius:50%;
    background:linear-gradient(135deg,var(--blue),var(--purple));
}

.page-hero h1{
    font-size:clamp(36px,6vw,56px);
    font-weight:800;
    line-height:1.07;
    letter-spacing:-0.04em;
    max-width:760px;
    margin:0 auto;
}

.page-hero h1 .accent{
    background:linear-gradient(135deg,var(--blue),var(--purple));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
}

.page-hero p{
    color:var(--muted);
    font-size:18px;
    line-height:1.7;
    max-width:520px;
    margin:22px auto 0;
}

/* ---------------- FORM ---------------- */

.content{
    padding:20px 0 90px;
}

.form-wrap{
    width:min(560px,92%);
    margin:auto;
}

.card{
    background:white;
    border:1px solid var(--border);
    border-radius:28px;
    padding:48px;
    box-shadow:0 10px 40px rgba(0,0,0,.04);
}

.field{
    margin-bottom:22px;
}

label{
    display:block;
    font-size:13px;
    font-weight:600;
    margin-bottom:8px;
    color:var(--text);
}

input,
textarea{
    width:100%;
    padding:13px 14px;
    border:1px solid var(--border);
    border-radius:12px;
    font-family:'Inter',sans-serif;
    font-size:15px;
    color:var(--text);
    background:var(--bg);
    transition:border-color .15s ease, box-shadow .15s ease;
}

input::placeholder,
textarea::placeholder{
    color:#9ca3af;
}

input:focus,
textarea:focus{
    outline:none;
    border-color:var(--blue);
    box-shadow:0 0 0 3px rgba(37,99,235,.12);
}

textarea{
    resize:vertical;
    min-height:140px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    color:white;
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:15px;
    cursor:pointer;
    background:linear-gradient(135deg,var(--blue),var(--purple));
    transition:.2s;
}

button:hover{
    transform:translateY(-1px);
    box-shadow:0 10px 24px rgba(37,99,235,.28);
}

button:active{
    transform:translateY(0);
}

button:disabled{
    opacity:.7;
    cursor:default;
    transform:none;
    box-shadow:none;
}

.status{
    margin-top:16px;
    font-size:14px;
    text-align:center;
    display:none;
}

.status.success{
    color:#15803d;
    display:block;
}

.status.error{
    color:#c0392b;
    display:block;
}

/* honeypot - hidden from real visitors, traps simple bots */
.hp{
    position:absolute;
    left:-9999px;
}

/* ---------------- FOOTER ---------------- */

footer{
    border-top:1px solid var(--border);
    background:white;
}

.footer-inner{
    height:90px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.footer-links{
    display:flex;
    gap:20px;
}

.footer-links a{
    text-decoration:none;
    color:var(--muted);
}

.footer-links a:hover{
    color:var(--text);
}

.copyright{
    color:var(--muted);
    font-size:14px;
}

/* ---------------- MOBILE ---------------- */

@media(max-width:768px){

    .card{
        padding:30px 24px;
        border-radius:22px;
    }

    .footer-inner{
        flex-direction:column;
        height:auto;
        gap:12px;
        padding:24px 0;
    }
}

@media(max-width:600px){

    .nav-links a:not(.nav-cta){
        display:none;
    }

    .page-hero{
        padding:56px 0 40px;
    }
}

</style>
</head>

<body>

<nav>
    <div class="container nav-inner">

        <a href="index.html" class="logo">NovaNext</a>

        <div class="nav-links">
            <a href="product.html">Products</a>
            <a href="about.html">About</a>
            <a href="support.html">Support</a>
            <a href="privacy.html">Privacy</a>
            <a href="contact.html" class="nav-cta active">Contact</a>
        </div>

    </div>
</nav>

<header class="page-hero">

    <div class="container">

        <div class="eyebrow"><span class="dot"></span>Get in touch</div>

        <h1>Let's <span class="accent">talk</span>.</h1>

        <p>
            Questions, feedback, or a bug to report — send a message
            and we'll get back to you.
        </p>

    </div>

</header>

<main class="content">

    <div class="form-wrap">

        <div class="card">

            <form id="contact-form" data-endpoint="https://formspree.io/f/xpqqpgnl">

                <input type="text" name="_gotcha" class="hp" tabindex="-1" autocomplete="off">

                <input type="hidden" name="_subject" id="subject-field" value="New message from NovaNext contact form">

                <div class="field">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Your name" required>
                </div>

                <div class="field">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>

                <div class="field">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" placeholder="How can we help?" required></textarea>
                </div>

                <button type="submit" id="submit-btn">Send message</button>
                <p class="status" id="status"></p>

            </form>

        </div>

    </div>

</main>

<footer>

    <div class="container footer-inner">

        <div class="copyright">© 2026 NovaNext</div>

        <div class="footer-links">
            <a href="product.html">Products</a>
            <a href="about.html">About</a>
            <a href="support.html">Support</a>
            <a href="contact.html">Contact</a>
            <a href="privacy.html">Privacy</a>
        </div>

    </div>

</footer>

<script>
    const form = document.getElementById('contact-form');
    const status = document.getElementById('status');
    const btn = document.getElementById('submit-btn');
    const message = document.getElementById('message');
    const subjectField = document.getElementById('subject-field');

    // If arriving from support.html?app=AppName, route the subject + prefill the message.
    // If there's no app param (regular contact visit), this block is skipped entirely
    // and the form behaves exactly as before, with the default subject above.
    const appParam = new URLSearchParams(window.location.search).get('app');
    if (appParam) {
        subjectField.value = `Support request: ${appParam}`;
        message.value = `Regarding: ${appParam}\n\n`;
        message.focus();
    }

    form.addEventListener('submit', async function (e) {
        e.preventDefault();
        btn.disabled = true;
        btn.textContent = 'Sending…';
        status.className = 'status';
        status.textContent = '';

        const formData = new FormData(form);
        const endpoint = form.dataset.endpoint;

        try {
            const response = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Accept': 'application/json' },
                body: formData
            });

            if (response.ok) {
                status.textContent = "Message sent — we'll get back to you soon.";
                status.className = 'status success';
                form.reset();
            } else {
                const result = await response.json().catch(() => null);
                status.textContent = (result && result.errors && result.errors[0]?.message)
                    ? result.errors[0].message
                    : 'Something went wrong. Please try again.';
                status.className = 'status error';
            }
        } catch (err) {
            status.textContent = 'Network error. Please try again.';
            status.className = 'status error';
        } finally {
            btn.disabled = false;
            btn.textContent = 'Send message';
        }
    });
</script>

</body>
</html>
